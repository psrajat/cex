[database]
host     = "localhost"
name     = "cex"
user     = "postgres"
password = "postgres"

# Chat / completion model settings.
# base_url must point to an OpenAI-compatible /v1 endpoint.
[llm]
base_url    = "http://192.168.1.2:8090/v1"
model       = "gemma4-26b:IQ4_NL"
api_key     = "ollama"
max_tokens  = 2048
temperature = 0.1

# Text-embedding model settings.
# dim must match the output dimension of the chosen model exactly.
# Changing dim after the first `cex setup` requires a `cex reset`.
[embed]
model      = "nomic-embed-text"
dim        = 768
batch_size = 32
